<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Projects</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: white;
  }

  .container {
    max-width: 900px;
    margin: 0 auto; /* removed top/bottom margin */
    padding: 80px 20px; /* keeps spacing inside instead */
    text-align: center;
  }

  h1 {
    margin-bottom: 10px;
  }

  p {
    color: #bbb;
    margin-bottom: 20px;
  }

  .resume-btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 20px;
    background: white;
    color: black;
    text-decoration: none;
    font-weight: bold;
    margin-bottom: 40px;
    transition: 0.2s;
  }

  .resume-btn:hover {
    background: #ddd;
  }

  .projects {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .card {
    padding: 25px;
    border-radius: 20px;
    background: #1e1e1e;
    cursor: pointer;
    transition: 0.2s;
    width: 140px;
  }

  .card:hover {
    transform: translateY(-5px);
    background: #2a2a2a;
  }

  .card h3 {
    margin: 0;
  }
</style>
</head>

<body>

<div class="container">

  <h1>Hi, I'm Zhen</h1>
  <p>I like to build cool things here are some of my projects that i have made and my resume</p>

  <a href="resumePlaceholder.pdf" class="resume-btn" target="_blank">View Resume</a>

  <div class="projects">

    <a href="Cproject1/" class="card">
      <h3>🕒 Clock</h3>
    </a>

    <a href="project2/" class="card">
      <h3>📁 Project 2</h3>
    </a>

  </div>

</div>

</body>
</html>
